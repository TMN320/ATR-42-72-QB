e flight deck indicate?", "options": ["A door is armed for emergency use", "A door is not locked- closed", "Emergency exits are blocked"], "correct_letter": "B", "correct_text": "A door is not locked- closed"}, {"question": "When is a cabin crew seat considered inoperative?", "options": ["When the cushions are damaged", "When it fails to stow automatically or seat belt/harness is malfunctioning or missing", "When the seat pan is wet"], "correct_letter": "B", "correct_text": "When it fails to stow automatically or seat belt/harness is malfunctioning or missing"}, {"question": "How can flight crew secure the cockpit door if electrical power is lost?", "options": ["By using the interphone security code", "By switching to hydraulic backup lock", "By pressing the “deny access” button for 3 minutes", "By manually engaging the locking bolts"], "correct_letter": "D", "correct_text": "By manually engaging the locking bolts"}, {"question": "Where are smoke detectors located in the AFT cargo compartment?", "options": ["One on the floor and one under the lavatory sink", "One in the ceiling for cargo detection, one in ceiling panel for lavatory detection", "Two behind the service door", "Two in the overhead hat racks"], "correct_letter": "B", "correct_text": "One in the ceiling for cargo detection, one in ceiling panel for lavatory detection"}, {"question": "What is a special feature of the cockpit door?", "options": ["It is fireproof and explosion resistant", "It is bulletproof and compliant with rapid decompression requirements", "It is equipped with a smoke barrier curtain", "It is designed to automatically open during emergencies"], "correct_letter": "B", "correct_text": "It is bulletproof and compliant with rapid decompression requirements"}, {"question": "Why must the safety pin be removed before closing the entrance door (ATR 500–600)?", "options": ["To prevent the railing from being damaged by pressure loads", "To reduce the weight on the stair assembly", "To allow cabin ions": ["10 percents", "20 percents", "25 percents", "30 percents"], "correct_letter": "C", "correct_text": "25 percents"}, {"question": "When the cabin crew presses the “normal access” button, what happens first?", "options": ["The door unlocks immediately", "The flight crew receives a visual light alert only", "A buzzer sounds in the flight crew compartment for at least 2 seconds", "The system disables for 3 minutes automatically"], "correct_letter": "C", "correct_text": "A buzzer sounds in the flight crew compartment for at least 2 seconds"}, {"question": "What is the correct sequence to fasten the flight crew seat belt? (ATR72/42)", "options": ["Insert shoulder straps → Close lap belt → Tighten", "Close lap belt → Lock shoulder straps only", "Close lap belt → Pull strap end to tighten → Pull down shoulder straps → Insert into lap belt fastener", "Fasten lap belt → Recline seat → Secure shoulder harness"], "correct_letter": "C", "correct_text": "Close lap belt → Pull strap end to tighten → Pull down shoulder straps → Insert into lap belt fastener"}, {"question": "Before starting passenger disembarkation on ATR 500–600 series, what must the cabin crew do?", "options": ["Remove the safety pin to lower the railing", "Install the safety pin to keep the railing upright", "Secure the stair with manual locks"], "correct_letter": "B", "correct_text": "Install the safety pin to keep the railing upright"}, {"question": "What type of restraint system is installed on flight crew seats? (ATR72/42)", "options": ["Lap belt only", "3-point harness", "Seat belt with two integrated shoulder straps (4-point buckle)", "Double lap belt with chest strap"], "correct_letter": "C", "correct_text": "Seat belt with two integrated shoulder straps (4-point buckle)"}];
let i=0;

const qEl=document.getElementById("q");
const ansEl=document.getElementById("answers");
const resEl=document.getElementById("result");

function render(){
 let q=data[i];
 qEl.innerHTML="<h3>"+q.question+"</h3>";
 ansEl.innerHTML="";
 resEl.innerHTML="";
 q.options.forEach((opt,idx)=>{
  let letter=String.fromCharCode(65+idx);
  let b=document.createElement("button");
  b.innerText=letter+". "+opt;
  b.onclick=()=>check(letter,q);
  ansEl.appendChild(b);
 });
}

function check(letter,q){
 if(letter===q.correct_letter)
   resEl.innerHTML="<b style='color:lime'>Correct</b>";
 else
   resEl.innerHTML="<b style='color:red'>Correct: "+q.correct_letter+" - "+q.correct_text+"</b>";
}

function next(){i=(i+1)%data.length;render()}
function prev(){i=(i-1+data.length)%data.length;render()}

render();

// install prompt
let deferred;
window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault();
 deferred=e;
 document.getElementById("install").style.display="block";
});

document.getElementById("install").onclick=()=>{
 if(deferred){deferred.prompt();deferred=null;}
};

if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}
</script>
