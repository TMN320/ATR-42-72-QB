<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.webmanifest">
<title>Operational Question Bank</title>
<style>
:root{
  --line: rgba(255,255,255,.18);
  --glass: rgba(12,18,35,.70);
  --glass2: rgba(12,18,35,.55);
  --text: #eef2ff;
  --muted: rgba(238,242,255,.75);
  --green: #28a745;
  --grey: #6c757d;
  --blue: #2c7be5;
  --shadow: 0 18px 45px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family: Arial;
  background:
    linear-gradient(rgba(0,0,0,0.62),rgba(0,0,0,0.62)),
    url("atr42.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text);
  margin:0;
  padding: 16px;
}
.app{ max-width: 820px; margin: 0 auto; padding-bottom: 110px; }
.header{ display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin: 6px 0 14px; }
.title h2{ margin:0; font-size: 20px; letter-spacing:.3px; }
.title .sub{ margin-top:4px; font-size: 12px; color: var(--muted); }
.chips{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.chip{ font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; background: rgba(255,255,255,.08); color: var(--muted); white-space:nowrap; }
.card{
  border: 1px solid var(--line);
  background: var(--glass);
  border-radius: 18px;
  padding: 14px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}
.progress{ height: 8px; width:100%; background: rgba(255,255,255,.10); border: 1px solid var(--line); border-radius: 999px; overflow:hidden; margin: 10px 0 12px; }
.bar{ height:100%; width:0%; background: rgba(255,255,255,.38); }
#q h3{ margin: 6px 0 10px; font-size: 20px; line-height: 1.25; }
#answers{ display:grid; gap: 10px; margin-top: 10px; }
button{
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.10);
  color: var(--text);
  width:100%;
  margin:0;
  font-size:16px;
  cursor:pointer;
  touch-action: manipulation;
}
button:active{transform: scale(.99);}

.bankRow{ display:flex; gap:10px; flex-wrap:wrap; margin: 4px 0 10px; }
.bankBtn{ width:auto; border-radius:999px; padding:10px 14px; font-weight:800; }
.bankBtn.active{ background: rgba(44,123,229,.25); border-color: rgba(44,123,229,.55); }

#install{
  background: rgba(44,123,229,.25);
  border: 1px solid rgba(44,123,229,.45);
  font-weight: 800;
  margin: 8px 0 0;
}
#result{
  margin-top: 12px;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.22);
  font-size: 14px;
  line-height: 1.35;
  color: var(--text);
}
#prevBtn{ background: rgba(108,117,125,.45); border-color: rgba(108,117,125,.7); font-weight:800; }
#nextBtn{ background: rgba(40,167,69,.45); border-color: rgba(40,167,69,.7); font-weight:800; }
.hint{ margin-top:10px; font-size:12px; color: var(--muted); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="title">
      <h2>Operational Question Bank</h2>
      <div class="sub">Training mode — tap an option to reveal the correct answer.</div>
    </div>
    <div class="chips">
      <div class="chip" id="counterChip">Q 0 / 0</div>
      <div class="chip" id="scoreChip">Score: 0</div>
    </div>
  </div>

  <div class="card">
    <div class="progress"><div class="bar" id="bar"></div></div>

    <div class="bankRow">
      <button id="bankATR" class="bankBtn" onclick="loadBank('ATR')">ATR</button>
      <button id="bankSOP" class="bankBtn" onclick="loadBank('SOP')">SOP</button>
    </div>

    <button id="install" style="display:none">Install App</button>

    <div id="q"></div>
    <div id="answers"></div>
    <div id="result"></div>

    <div class="hint">Tip: Tap an answer to reveal the correct one.</div>
  </div>
</div>

<button id="prevBtn" onclick="prev()">Previous</button>
<button id="nextBtn" onclick="next()">Next</button>

<script>
/* ===== PASSWORD (NOTE: this is NOT real security on a public repo) ===== */
const SITE_PASSWORD = "PROPELERIS2026";
if (sessionStorage.getItem("siteAuth") !== "ok") {
  const p = prompt("Enter access password:");
  if (p === SITE_PASSWORD) sessionStorage.setItem("siteAuth", "ok");
  else {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:black;color:white;font-family:Arial"><h2>Access Denied</h2></div>`;
    throw new Error("Access denied");
  }
}

/* ===== STATE ===== */
let data = [];
let currentBank = "";
let i = 0;
let score = 0;
let answered = new Set();

/* ===== ELEMENTS ===== */
const qEl = document.getElementById("q");
const ansEl = document.getElementById("answers");
const resEl = document.getElementById("result");
const counterChip = document.getElementById("counterChip");
const scoreChip = document.getElementById("scoreChip");
const bar = document.getElementById("bar");
const bankATR = document.getElementById("bankATR");
const bankSOP = document.getElementById("bankSOP");

/* ===== LOAD BANK ===== */
async function loadBank(bankName){
  currentBank = bankName;
  bankATR.classList.toggle("active", bankName === "ATR");
  bankSOP.classList.toggle("active", bankName === "SOP");

  try{
    const res = await fetch(`Banks/${bankName}.json`, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if(!Array.isArray(json)) throw new Error("JSON is not an array");
    data = json;
    localStorage.setItem("lastBank", bankName);
    localStorage.setItem("cache_" + bankName, JSON.stringify(json));
  } catch(e){
    // offline fallback
    data = JSON.parse(localStorage.getItem("cache_" + bankName) || "[]");
  }

  i = 0;
  score = 0;
  answered = new Set();
  render();
}
window.loadBank = loadBank;

/* ===== HEADER / PROGRESS ===== */
function updateHeader(){
  const total = data.length || 0;
  const pos = total ? (i + 1) : 0;
  counterChip.innerText = `Q ${pos} / ${total}`;
  scoreChip.innerText = `Score: ${score}`;
  bar.style.width = total ? ((pos/total)*100) + "%" : "0%";
}

/* ===== RENDER ===== */
function render(){
  updateHeader();

  if(!data.length){
    qEl.innerHTML = "<h3>No questions loaded.</h3>";
    ansEl.innerHTML = "";
    resEl.innerHTML = currentBank
      ? `Check Banks/${currentBank}.json (must be a JSON array).`
      : "Choose ATR or SOP.";
    return;
  }

  const q = data[i];
  qEl.innerHTML = "<h3>" + escapeHtml(q.question) + "</h3>";
  ansEl.innerHTML = "";
  resEl.innerHTML = "";

  (q.options || []).forEach((opt, idx) => {
    const letter = String.fromCharCode(65 + idx);
    const b = document.createElement("button");
    b.innerText = letter + ". " + opt;
    b.onclick = () => check(letter, q);
    ansEl.appendChild(b);
  });
}

/* ===== CHECK ===== */
function check(letter, q){
  const correct = (letter === q.correct_letter);

  if(correct && !answered.has(i)){
    score++;
    answered.add(i);
  }
  updateHeader();

  Array.from(ansEl.children).forEach(b => b.disabled = true);

  if(correct){
    resEl.innerHTML =
      "<b style='color:lime'>✅ Correct</b><br>" +
      escapeHtml(q.correct_letter + " - " + q.correct_text);
  } else {
    resEl.innerHTML =
      "<b style='color:#ff6b6b'>❌ Incorrect</b><br>" +
      "Correct: " + escapeHtml(q.correct_letter + " - " + q.correct_text);
  }
}

/* ===== NAV ===== */
function next(){ if(!data.length) return; i = (i+1)%data.length; render(); }
function prev(){ if(!data.length) return; i = (i-1+data.length)%data.length; render(); }
window.next = next; window.prev = prev;

/* ===== SWIPE ===== */
let startX = null;
document.addEventListener("touchstart",(e)=>{ startX = e.touches[0].clientX; }, {passive:true});
document.addEventListener("touchend",(e)=>{
  if(startX===null) return;
  const endX = e.changedTouches[0].clientX;
  const dx = endX - startX;
  if(Math.abs(dx) > 60){ dx < 0 ? next() : prev(); }
  startX = null;
}, {passive:true});

/* ===== INSTALL PROMPT ===== */
let deferred;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferred=e;
  document.getElementById("install").style.display="block";
});
document.getElementById("install").onclick=()=>{
  if(deferred){ deferred.prompt(); deferred=null; }
};

/* ===== SERVICE WORKER ===== */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* ===== START ===== */
const last = localStorage.getItem("lastBank") || "ATR";
loadBank(last);
</script>

</body>
</html>
