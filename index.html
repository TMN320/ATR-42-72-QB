
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.webmanifest">
<title>ATR Quiz</title>
<style>
:root{
  --line: rgba(255,255,255,.18);
  --glass: rgba(12,18,35,.70);
  --glass2: rgba(12,18,35,.55);
  --text: #eef2ff;
  --muted: rgba(238,242,255,.75);
  --green: #28a745;
  --grey: #6c757d;
  --blue: #2c7be5;
  --shadow: 0 18px 45px rgba(0,0,0,.45);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family: Arial;
  background:
    linear-gradient(rgba(0,0,0,0.62),rgba(0,0,0,0.62)),
    url("atr42.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text);
  margin:0;
  padding: 16px;
}

.app{
  max-width: 820px;
  margin: 0 auto;
  padding-bottom: 110px;
}

.header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin: 6px 0 14px;
}

.title h2{
  margin:0;
  font-size: 20px;
  letter-spacing:.3px;
}
.title .sub{
  margin-top:4px;
  font-size: 12px;
  color: var(--muted);
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.chip{
  font-size:12px;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background: rgba(255,255,255,.08);
  color: var(--muted);
  white-space:nowrap;
}

.card{
  border: 1px solid var(--line);
  background: var(--glass);
  border-radius: 18px;
  padding: 14px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}

.progress{
  height: 8px;
  width:100%;
  background: rgba(255,255,255,.10);
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow:hidden;
  margin: 10px 0 12px;
}
.bar{height:100%;width:0%;background: rgba(255,255,255,.38);}

#q h3{
  margin: 6px 0 10px;
  font-size: 20px;
  line-height: 1.25;
}

#answers{
  display:grid;
  gap: 10px;
  margin-top: 10px;
}

button{
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.10);
  color: var(--text);
  width:100%;
  margin:0;
  font-size:16px;
  cursor:pointer;
  touch-action: manipulation;
}
button:active{transform: scale(.99);}

#install{
  background: rgba(44,123,229,.25);
  border: 1px solid rgba(44,123,229,.45);
  font-weight: 800;
  margin: 10px 0 0;
}

#result{
  margin-top: 12px;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.22);
  font-size: 14px;
  line-height: 1.35;
  color: var(--text);
}

.bottom{
  position: fixed;
  left:0; right:0; bottom:0;
  padding: 10px 12px;
  background: rgba(7,10,20,.78);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
}

.nav{
  max-width: 820px;
  margin: 0 auto;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

#prevBtn{ background: rgba(108,117,125,.45); border-color: rgba(108,117,125,.7); font-weight:800; }
#nextBtn{ background: rgba(40,167,69,.45); border-color: rgba(40,167,69,.7); font-weight:800; }

.hint{
  margin-top:10px;
  font-size:12px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="title">
      <h2>ATR Question Bank</h2>
      <div class="sub">Training mode — tap an option to reveal the correct answer.</div>
    </div>

    <div class="chips">
      <div class="chip" id="counterChip">Q 1</div>
      <div class="chip" id="scoreChip">Score: 0</div>
    </div>
  </div>

  <div class="card">
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <button id="install" style="display:none">Install App</button>

    <div id="q"></div>
    <div id="answers"></div>
    <div id="result"></div>

    <div class="hint">
      Tip: Tap an answer to reveal the correct one.
    </div>
  </div>
</div>

<button id="prevBtn" onclick="prev()">Previous</button>
<button id="nextBtn" onclick="next()">Next</button>

<script>

const data = [{"question": "What is provided for survival equipment in the observer seat? (ATR72/42)", "options": ["Portable fire extinguisher attachment", "Oxygen bottle holder", "Life vest stowage"], "correct_letter": "C", "correct_text": "Life vest stowage"} /* ... KEEP YOUR FULL DATA ARRAY HERE ... */ ];
let i = 0;

// UI elements
const qEl = document.getElementById("q");
const ansEl = document.getElementById("answers");
const resEl = document.getElementById("result");
const counterChip = document.getElementById("counterChip");
const scoreChip = document.getElementById("scoreChip");
const bar = document.getElementById("bar");

// Score tracking
let score = 0;
let answered = new Set(); // store question index already scored

function updateHeader(){
  if(counterChip) counterChip.innerText = `Q ${i+1} / ${data.length}`;
  if(scoreChip) scoreChip.innerText = `Score: ${score}`;
  if(bar) bar.style.width = `${Math.round(((i+1)/data.length)*100)}%`;
}

function render(){
  const q = data[i];

  updateHeader();

  qEl.innerHTML = "<h3>" + q.question + "</h3>";
  ansEl.innerHTML = "";
  resEl.innerHTML = "";

  q.options.forEach((opt, idx) => {
    const letter = String.fromCharCode(65 + idx);
    const b = document.createElement("button");
    b.innerText = letter + ". " + opt;
    b.onclick = () => check(letter, q);
    ansEl.appendChild(b);
  });
}

function check(letter, q){
  const correct = (letter === q.correct_letter);

  // Add score only once per question
  if(correct && !answered.has(i)){
    score += 1;
    answered.add(i);
  }
  updateHeader();

  if(correct){
    resEl.innerHTML = "<b style='color:lime'>✅ Correct</b>";
  } else {
    resEl.innerHTML =
      "<b style='color:#ff6b6b'>❌ Incorrect</b><br>" +
      "Correct: <b>" + q.correct_letter + "</b> - " + q.correct_text;
  }
}

function next(){
  i = (i + 1) % data.length;
  render();
}
function prev(){
  i = (i - 1 + data.length) % data.length;
  render();
}

render();

// install prompt
let deferred;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferred = e;
  document.getElementById("install").style.display = "block";
});

document.getElementById("install").onclick = () => {
  if(deferred){
    deferred.prompt();
    deferred = null;
  }
};

// Offline
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
